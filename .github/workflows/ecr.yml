name: Build and Push to ECR

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Debug (optional but useful – remove later)
      - name: Debug Info
        run: |
          echo "Running on: $(uname -a)"
          docker --version

      # 3. Configure AWS credentials (your names)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ secrets.REGION }}

      # 4. Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Build Docker image (IMPORTANT: correct path)
      - name: Build Image
        run: |
          docker build -t catalogue ./app

      # 6. Tag Docker image
      - name: Tag Image
        run: |
          docker tag catalogue:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.REGION }}.amazonaws.com/catalogue:latest

      # 7. Push to ECR
      - name: Push Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.REGION }}.amazonaws.com/catalogue:latest
